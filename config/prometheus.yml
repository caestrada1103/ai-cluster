# Prometheus Configuration
# =======================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ai-cluster
    environment: production

# Rule files
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Coordinator metrics
  - job_name: "coordinator"
    static_configs:
      - targets: ["coordinator:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    scheme: http
    basic_auth:
      username: prometheus
      password: password

  # Worker metrics
  - job_name: "workers"
    static_configs:
      - targets:
          - "worker:9091"
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+).*"
        replacement: "${1}"