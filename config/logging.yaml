# Logging Configuration
# =====================

version: 1
disable_existing_loggers: false

formatters:
  json:
    format: "%(asctime)s %(name)s %(levelname)s %(message)s"
    class: pythonjsonlogger.jsonlogger.JsonFormatter
  verbose:
    format: "%(asctime)s %(levelname)s %(name)s %(filename)s:%(lineno)d - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  simple:
    format: "%(levelname)s - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: verbose
    stream: ext://sys.stdout

  console_json:
    class: logging.StreamHandler
    level: INFO
    formatter: json
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: verbose
    filename: /var/log/ai-cluster/coordinator.log
    maxBytes: 10485760  # 10MB
    backupCount: 10

  file_json:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: /var/log/ai-cluster/coordinator.json.log
    maxBytes: 10485760
    backupCount: 10

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: verbose
    filename: /var/log/ai-cluster/coordinator.error.log
    maxBytes: 10485760
    backupCount: 5

loggers:
  coordinator:
    level: INFO
    handlers: [console, file]
    propagate: false

  worker_client:
    level: INFO
    handlers: [console, file]
    propagate: false

  model_loader:
    level: INFO
    handlers: [console, file]
    propagate: false

  gpu_manager:
    level: INFO
    handlers: [console, file]
    propagate: false

  api:
    level: INFO
    handlers: [console, file]
    propagate: false

  metrics:
    level: WARNING
    handlers: [console, file]
    propagate: false

  burn:
    level: WARNING
    handlers: [console, file]
    propagate: false

  tonic:
    level: WARNING
    handlers: [console, file]
    propagate: false

  grpc:
    level: WARNING
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console, file]