# Model Configuration Registry
# ============================

# Default settings applied to all models
[defaults]
quantization = "fp16"
parallelism = "auto"
max_batch_size = 32
max_seq_len = 4096
cache_size_gb = 8
warm_up_prompts = [
    "Hello",
    "What is AI?"
]

# DeepSeek Models
# ===============

[models.deepseek-7b]
family = "deepseek"
description = "DeepSeek 7B Base Model with MoE"
parameters = "7B"
min_memory_gb = 16
recommended_gpus = 1
max_gpus = 2

[models.deepseek-7b.architecture]
num_layers = 30
hidden_size = 4096
num_attention_heads = 32
num_kv_heads = 32
vocab_size = 32256
max_seq_len = 4096
intermediate_size = 11008
rms_norm_eps = 1e-6
rope_theta = 10000.0
is_moe = true
num_experts = 64
num_experts_per_tok = 6

[models.deepseek-7b.paths]
config = "./models/deepseek-7b/config.json"
weights = "./models/deepseek-7b/model.safetensors"
tokenizer = "./models/deepseek-7b/tokenizer.json"
vocab = "./models/deepseek-7b/vocab.json"

[models.deepseek-7b.quantization]
supported = ["fp16", "int8", "int4"]
default = "fp16"

[models.deepseek-7b.parallelism]
supported = ["single", "pipeline", "expert"]
default = "auto"

[models.deepseek-7b.hf]
repo_id = "deepseek-ai/deepseek-llm-7b-base"
filename = "model.safetensors"

[models.deepseek-67b]
family = "deepseek"
description = "DeepSeek 67B Model with extensive MoE"
parameters = "67B"
min_memory_gb = 140
recommended_gpus = 4
max_gpus = 8

[models.deepseek-67b.architecture]
num_layers = 95
hidden_size = 8192
num_attention_heads = 64
num_kv_heads = 64
vocab_size = 32256
max_seq_len = 4096
intermediate_size = 22016
rms_norm_eps = 1e-6
rope_theta = 10000.0
is_moe = true
num_experts = 128
num_experts_per_tok = 8

[models.deepseek-67b.paths]
config = "./models/deepseek-67b/config.json"
weights = "./models/deepseek-67b/model.safetensors"
tokenizer = "./models/deepseek-67b/tokenizer.json"

[models.deepseek-67b.quantization]
supported = ["int8", "int4", "fp8"]
default = "int8"

[models.deepseek-67b.parallelism]
supported = ["pipeline", "tensor", "expert"]
default = "auto"

[models.deepseek-67b.hf]
repo_id = "deepseek-ai/deepseek-llm-67b-base"
filename = "model.safetensors.index.json"

