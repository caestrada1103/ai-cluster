# Complete Docker Compose for AI Cluster
# ======================================

version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Coordinator
  coordinator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.coordinator
    image: ai-coordinator:latest
    container_name: ai-coordinator
    environment:
      - COORDINATOR_HOST=0.0.0.0
      - COORDINATOR_PORT=8000
      - DISCOVERY_METHOD=mdns
      - RUST_LOG=info
      - CONFIG_FILE=/app/config/coordinator.yaml
    volumes:
      - ../config:/app/config:ro
      - ../models:/app/models:ro
      - ../data:/app/data
      - ../logs:/app/logs
    networks:
      - ai-cluster-net
    ports:
      - "8000:8000"   # HTTP API
      - "9090:9090"   # Metrics
    depends_on:
      - prometheus
      - grafana
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # AMD GPU Workers
  worker-amd-0:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        GPU_BACKEND: hip
    image: ai-worker:amd
    container_name: ai-worker-amd-0
    runtime: runc
    privileged: true
    environment:
      - WORKER_ID=amd-gpu-0
      - GRPC_PORT=50051
      - METRICS_PORT=9091
      - GPU_IDS=0
      - RUST_LOG=info
      - ROCM_VISIBLE_DEVICES=0
    volumes:
      - ../config:/app/config:ro
      - ../models:/app/models:ro
      - ../data:/app/data
      - /opt/rocm:/opt/rocm:ro
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    devices:
      - /dev/kfd
      - /dev/dri/renderD128
    group_add:
      - video
      - render
    networks:
      - ai-cluster-net
    ports:
      - "50051:50051"
      - "9091:9091"
    logging: *default-logging
    depends_on:
      - coordinator
    restart: unless-stopped

  worker-amd-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        GPU_BACKEND: hip
    image: ai-worker:amd
    container_name: ai-worker-amd-1
    runtime: runc
    privileged: true
    environment:
      - WORKER_ID=amd-gpu-1
      - GRPC_PORT=50052
      - METRICS_PORT=9092
      - GPU_IDS=1
      - RUST_LOG=info
      - ROCM_VISIBLE_DEVICES=1
    volumes:
      - ../config:/app/config:ro
      - ../models:/app/models:ro
      - ../data:/app/data
      - /opt/rocm:/opt/rocm:ro
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    devices:
      - /dev/kfd
      - /dev/dri/renderD129
    group_add:
      - video
      - render
    networks:
      - ai-cluster-net
    ports:
      - "50052:50052"
      - "9092:9092"
    logging: *default-logging
    depends_on:
      - coordinator
    restart: unless-stopped

  # NVIDIA GPU Workers
  worker-nvidia-0:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        GPU_BACKEND: cuda
    image: ai-worker:nvidia
    container_name: ai-worker-nvidia-0
    runtime: nvidia
    environment:
      - WORKER_ID=nvidia-gpu-0
      - GRPC_PORT=50053
      - METRICS_PORT=9093
      - GPU_IDS=0
      - RUST_LOG=info
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ../config:/app/config:ro
      - ../models:/app/models:ro
      - ../data:/app/data
    networks:
      - ai-cluster-net
    ports:
      - "50053:50053"
      - "9093:9093"
    logging: *default-logging
    depends_on:
      - coordinator
    restart: unless-stopped

  worker-nvidia-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        GPU_BACKEND: cuda
    image: ai-worker:nvidia
    container_name: ai-worker-nvidia-1
    runtime: nvidia
    environment:
      - WORKER_ID=nvidia-gpu-1
      - GRPC_PORT=50054
      - METRICS_PORT=9094
      - GPU_IDS=1
      - RUST_LOG=info
      - NVIDIA_VISIBLE_DEVICES=1
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ../config:/app/config:ro
      - ../models:/app/models:ro
      - ../data:/app/data
    networks:
      - ai-cluster-net
    ports:
      - "50054:50054"
      - "9094:9094"
    logging: *default-logging
    depends_on:
      - coordinator
    restart: unless-stopped

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-prometheus
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../config/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - ai-cluster-net
    ports:
      - "9090:9090"
    logging: *default-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ai-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - ai-cluster-net
    ports:
      - "3000:3000"
    logging: *default-logging
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - ai-cluster-net
    ports:
      - "9100:9100"
    logging: *default-logging
    restart: unless-stopped

  # Model Cache (Optional)
  minio:
    image: minio/minio:latest
    container_name: ai-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_DEFAULT_BUCKETS=models
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - ai-cluster-net
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    logging: *default-logging
    restart: unless-stopped

  # Redis for caching (Optional)
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - ai-cluster-net
    ports:
      - "6379:6379"
    logging: *default-logging
    restart: unless-stopped

  # Jaeger for tracing (Optional)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ai-jaeger
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - ai-cluster-net
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # UI
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    logging: *default-logging
    restart: unless-stopped

networks:
  ai-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus-data:
  grafana-data:
  minio-data:
  redis-data: