version: "3.9"

services:
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - worker1
      - worker2
    volumes:
      - ./models:/app/models:ro

  worker1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - WORKER_PORT=50051
    deploy:
      resources:
        reservations:
          devices:
            - driver: "rocm"
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/app/models:ro

  worker2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - WORKER_PORT=50052
    deploy:
      resources:
        reservations:
          devices:
            - driver: "rocm"
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/app/models:ro