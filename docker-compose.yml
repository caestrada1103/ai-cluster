# Root docker-compose.yml
# =======================
# Docker Compose configuration for the AI Cluster
# Uses a single universal worker image (wgpu/Vulkan) for any GPU.

services:
  # Coordinator
  coordinator:
    build:
      context: .
      dockerfile: docker/Dockerfile.coordinator
    image: ai-coordinator:latest
    container_name: ai-coordinator
    environment:
      - COORDINATOR_HOST=0.0.0.0
      - COORDINATOR_PORT=8000
      - DISCOVERY_METHOD=mdns
      - RUST_LOG=info
      - CONFIG_FILE=/app/config/coordinator.yaml
    volumes:
      - ./config:/app/config:ro
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - ai-cluster-net
    ports:
      - "8000:8000" # HTTP API & Metrics
    depends_on:
      - prometheus
      - grafana
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Universal GPU Worker
  # By default, starts a single worker on GPU 0.
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: ai-worker:latest
    environment:
      - GPU_INDEX=${GPU_INDEX:-0}
      - GPU_VRAM_GB=${GPU_VRAM_GB:-6}
      - GRPC_BASE_PORT=${GRPC_BASE_PORT:-50051}
      - METRICS_BASE_PORT=${METRICS_BASE_PORT:-9091}
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./config:/app/config:ro
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - ai-cluster-net
    ports:
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
      - "${METRICS_PORT:-9091}:${METRICS_PORT:-9091}"
    logging: *default-logging
    depends_on:
      - coordinator
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped

  # ==========================================================================
  # Multi-GPU example: uncomment and adjust for machines with multiple GPUs.
  # Each worker gets a unique GPU_INDEX and port pair.
  # ==========================================================================
  # worker-gpu-0:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker
  #   image: ai-worker:latest
  #   environment:
  #     - GPU_INDEX=0
  #     - GRPC_BASE_PORT=50051
  #     - METRICS_BASE_PORT=9091
  #     - RUST_LOG=trace
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./models:/app/models
  #   networks:
  #     - ai-cluster-net
  #   ports:
  #     - "50051:50051"
  #     - "9091:9091"
  #   depends_on:
  #     - coordinator

  # # Worker 2 (GPU 1)
  # worker-gpu-1:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker
  #   image: ai-worker:latest
  #   environment:
  #     - GPU_INDEX=1
  #     - GRPC_BASE_PORT=50052
  #     - METRICS_BASE_PORT=9092
  #     - RUST_LOG=trace
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./models:/app/models
  #   networks:
  #     - ai-cluster-net
  #   ports:
  #     - "50052:50052"
  #     - "9092:9092"
  #   depends_on:
  #     - coordinator

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - ai-cluster-net
    ports:
      - "9099:9090"
    logging: *default-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ai-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - ai-cluster-net
    ports:
      - "3000:3000"
    logging: *default-logging
    depends_on:
      - prometheus
    restart: unless-stopped

  # Open-WebUI (Chat Interface)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-open-webui
    environment:
      - OPENAI_API_BASE_URL=http://coordinator:8000/v1
      - OPENAI_API_KEY=sk-1234567890abcdef # Default from coordinator.yaml
      - WEBUI_AUTH=False # Disable login screen for local network
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - ai-cluster-net
    ports:
      - "8080:8080"
    depends_on:
      - coordinator
    restart: unless-stopped

networks:
  ai-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus-data:
  grafana-data:
  open-webui-data:
