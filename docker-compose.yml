# Root docker-compose.yml
# =======================
# Docker Compose configuration for the AI Cluster
#
# Worker image selection — uncomment the block that matches your GPU:
#
#   ┌─────────────────────────────────────────────────────────────────┐
#   │  Dockerfile               Backend   AMD  NVIDIA  Intel  Perf   │
#   │  Dockerfile.worker        wgpu      ✓    ✓       ✓      good   │ ← default
#   │  Dockerfile.worker.amd    burn/rocm ✓    ✗       ✗      best   │
#   │  Dockerfile.worker.nvidia burn/cuda ✗    ✓       ✗      best   │
#   └─────────────────────────────────────────────────────────────────┘
#
# The default "worker" service uses the universal wgpu image with AMD
# device passthrough.  NVIDIA and high-perf AMD alternatives are
# commented out below — swap the active "worker" block as needed.

services:
  # Coordinator
  coordinator:
    build:
      context: .
      dockerfile: docker/Dockerfile.coordinator
    image: ai-coordinator:latest
    container_name: ai-coordinator
    environment:
      - COORDINATOR_HOST=0.0.0.0
      - COORDINATOR_PORT=8000
      - COORDINATOR_DISCOVERY_METHOD=static
      - COORDINATOR_STATIC_WORKERS=["worker:50051"]
      - RUST_LOG=info
      - CONFIG_FILE=/app/config/coordinator.yaml
    volumes:
      - ./config:/app/config:ro
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - ai-cluster-net
    ports:
      - "8000:8000" # HTTP API & Metrics
    depends_on:
      - prometheus
      - grafana
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ==========================================================================
  # Worker — Universal wgpu/Vulkan (AMD + NVIDIA + Intel)
  # Default: AMD device passthrough.
  # NVIDIA users: remove "devices / security_opt / group_add" and add the
  #   "deploy.resources.reservations.devices" block from the NVIDIA section.
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: ai-worker:latest
    environment:
      - GPU_INDEX=${GPU_INDEX:-0}
      - GRPC_BASE_PORT=${GRPC_BASE_PORT:-50051}
      - METRICS_BASE_PORT=${METRICS_BASE_PORT:-9091}
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./config:/app/config:ro
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - ai-cluster-net
    ports:
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
      - "${METRICS_PORT:-9091}:${METRICS_PORT:-9091}"
    logging: *default-logging
    depends_on:
      - coordinator
    # AMD Vulkan device passthrough — remove these three keys for NVIDIA
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - seccomp=unconfined
    group_add:
      - video
      - render
    restart: unless-stopped

  # ==========================================================================
  # Worker — NVIDIA wgpu/Vulkan (same universal image, NVIDIA device access)
  # Replace the "worker" service above with this block on NVIDIA machines.
  # Requires NVIDIA Container Toolkit:
  #   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  # ==========================================================================
  # worker:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker
  #   image: ai-worker:latest
  #   environment:
  #     - GPU_INDEX=${GPU_INDEX:-0}
  #     - GRPC_BASE_PORT=${GRPC_BASE_PORT:-50051}
  #     - METRICS_BASE_PORT=${METRICS_BASE_PORT:-9091}
  #     - RUST_LOG=info
  #     - RUST_BACKTRACE=1
  #     - HF_TOKEN=${HF_TOKEN}
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./models:/app/models
  #     - ./data:/app/data
  #   networks:
  #     - ai-cluster-net
  #   ports:
  #     - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
  #     - "${METRICS_PORT:-9091}:${METRICS_PORT:-9091}"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             device_ids: ["${GPU_INDEX:-0}"]
  #             capabilities: [gpu]
  #   depends_on:
  #     - coordinator
  #   restart: unless-stopped

  # ==========================================================================
  # Worker — AMD native ROCm (burn/rocm, maximum AMD performance)
  # Replace the "worker" service above with this block for AMD max performance.
  # ==========================================================================
  # worker:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker.amd
  #   image: ai-worker-amd:latest
  #   environment:
  #     - GPU_INDEX=${GPU_INDEX:-0}
  #     - GRPC_BASE_PORT=${GRPC_BASE_PORT:-50051}
  #     - METRICS_BASE_PORT=${METRICS_BASE_PORT:-9091}
  #     - RUST_LOG=info
  #     - RUST_BACKTRACE=1
  #     - HF_TOKEN=${HF_TOKEN}
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./models:/app/models
  #     - ./data:/app/data
  #   networks:
  #     - ai-cluster-net
  #   ports:
  #     - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
  #     - "${METRICS_PORT:-9091}:${METRICS_PORT:-9091}"
  #   devices:
  #     - /dev/kfd
  #     - /dev/dri
  #   security_opt:
  #     - seccomp=unconfined
  #   group_add:
  #     - video
  #     - render
  #   depends_on:
  #     - coordinator
  #   restart: unless-stopped

  # ==========================================================================
  # Worker — NVIDIA native CUDA (burn/cuda, maximum NVIDIA performance)
  # Replace the "worker" service above with this block for NVIDIA max performance.
  # Requires NVIDIA Container Toolkit.
  # ==========================================================================
  # worker:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker.nvidia
  #   image: ai-worker-nvidia:latest
  #   environment:
  #     - GPU_INDEX=${GPU_INDEX:-0}
  #     - GRPC_BASE_PORT=${GRPC_BASE_PORT:-50051}
  #     - METRICS_BASE_PORT=${METRICS_BASE_PORT:-9091}
  #     - RUST_LOG=info
  #     - RUST_BACKTRACE=1
  #     - HF_TOKEN=${HF_TOKEN}
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./models:/app/models
  #     - ./data:/app/data
  #   networks:
  #     - ai-cluster-net
  #   ports:
  #     - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
  #     - "${METRICS_PORT:-9091}:${METRICS_PORT:-9091}"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             device_ids: ["${GPU_INDEX:-0}"]
  #             capabilities: [gpu]
  #   depends_on:
  #     - coordinator
  #   restart: unless-stopped

  # ==========================================================================
  # Multi-GPU example: uncomment and adjust for machines with multiple GPUs.
  # Each worker gets a unique GPU_INDEX and port pair.
  # Applies to any of the Dockerfile variants above — just change the
  # dockerfile and image fields to match your chosen backend.
  # ==========================================================================
  # worker-gpu-0:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker   # or .amd / .nvidia
  #   image: ai-worker:latest
  #   environment:
  #     - GPU_INDEX=0
  #     - GRPC_BASE_PORT=50051
  #     - METRICS_BASE_PORT=9091
  #     - RUST_LOG=info
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./models:/app/models
  #   networks:
  #     - ai-cluster-net
  #   ports:
  #     - "50051:50051"
  #     - "9091:9091"
  #   depends_on:
  #     - coordinator

  # worker-gpu-1:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.worker   # or .amd / .nvidia
  #   image: ai-worker:latest
  #   environment:
  #     - GPU_INDEX=1
  #     - GRPC_BASE_PORT=50051
  #     - METRICS_BASE_PORT=9091
  #     - RUST_LOG=info
  #   volumes:
  #     - ./config:/app/config:ro
  #     - ./models:/app/models
  #   networks:
  #     - ai-cluster-net
  #   ports:
  #     - "50052:50052"
  #     - "9092:9092"
  #   depends_on:
  #     - coordinator

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - ai-cluster-net
    ports:
      - "9099:9090"
    logging: *default-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ai-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - ai-cluster-net
    ports:
      - "3000:3000"
    logging: *default-logging
    depends_on:
      - prometheus
    restart: unless-stopped

  # Open-WebUI (Chat Interface)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-open-webui
    environment:
      - OPENAI_API_BASE_URLS=http://coordinator:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - ENABLE_OLLAMA_API=False
      - WEBUI_AUTH=False # Disable login screen for local network
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - ai-cluster-net
    ports:
      - "8080:8080"
    depends_on:
      - coordinator
    restart: unless-stopped

networks:
  ai-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus-data:
  grafana-data:
  open-webui-data:
